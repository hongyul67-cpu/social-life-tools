<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사회생활 준비 학습 도구 모음</title>
<style>
  :root{--bg:#f6f7fb;--card:#fff;--ink:#1f2430;--muted:#6b7280;--line:#e8eaf0;--shadow:0 10px 30px rgba(40,50,90,.08)}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic','Segoe UI',sans-serif;
    background:linear-gradient(170deg,#f3f5fb,#fff);color:var(--ink)}

  /* ===== 홈 화면 ===== */
  #home{min-height:100%;padding:34px 22px 56px}
  .wrap{max-width:1160px;margin:0 auto}
  .hero{text-align:center;margin-bottom:30px}
  .hero .badge{display:inline-block;font-size:14px;font-weight:700;color:#5b6478;background:#eef1f9;
    border:1px solid #e1e6f3;border-radius:999px;padding:6px 16px;margin-bottom:14px}
  .hero h1{font-size:40px;font-weight:800;letter-spacing:-1.2px;line-height:1.2}
  .hero p{margin-top:10px;color:var(--muted);font-size:18px}

  /* 단원 섹션 */
  .unit{margin-top:32px}
  .unit:first-of-type{margin-top:8px}
  .uhead{display:flex;align-items:center;gap:14px;margin-bottom:16px}
  .uchip{flex:0 0 auto;display:inline-flex;align-items:baseline;gap:6px;background:#1f2430;color:#fff;
    border-radius:12px;padding:8px 16px;font-weight:800}
  .uchip .big{font-size:22px;letter-spacing:-.5px}
  .uchip .lab{font-size:13px;opacity:.8}
  .ucount{flex:0 0 auto;font-size:14px;font-weight:700;color:var(--muted)}
  .uline{flex:1 1 auto;height:1px;background:var(--line)}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .card{position:relative;background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);
    padding:22px 22px 20px;cursor:pointer;text-align:left;overflow:hidden;
    transition:transform .12s ease,box-shadow .15s ease;border-top:5px solid var(--ac)}
  .card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(40,50,90,.14)}
  .card:active{transform:translateY(-1px)}
  .card .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .card .emoji{font-size:40px;line-height:1}
  .card .no{font-size:12px;font-weight:800;color:var(--ac);background:#f7f8fc;
    border:1px solid var(--line);border-radius:999px;padding:4px 10px}
  .card h3{font-size:21px;font-weight:800;letter-spacing:-.4px;margin-bottom:7px}
  .card p{font-size:14.5px;color:var(--muted);line-height:1.5;min-height:42px}
  .card .go{margin-top:14px;font-size:14px;font-weight:800;color:var(--ac)}

  .foot{text-align:center;color:var(--muted);font-size:14px;margin-top:40px;line-height:1.7}

  /* ===== 뷰어 화면 ===== */
  #viewer{position:fixed;inset:0;display:none;flex-direction:column;background:#fff;z-index:50}
  #viewer.show{display:flex}
  .bar{flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:10px 16px;
    border-bottom:1px solid var(--line);background:#fbfcfe}
  .bar button{font-family:inherit;font-weight:800;font-size:16px;cursor:pointer;border:1px solid var(--line);
    background:#fff;color:#374151;border-radius:12px;padding:9px 16px;transition:background .12s}
  .bar button:hover{background:#f1f3f9}
  .bar .vt{font-size:17px;font-weight:800;display:flex;align-items:center;gap:9px}
  .bar .vt .dot{width:11px;height:11px;border-radius:50%;background:var(--ac)}
  .bar .vt .ubadge{font-size:13px;font-weight:800;color:#fff;background:var(--ac);border-radius:8px;padding:3px 9px}
  .bar .hintkey{margin-left:auto;font-size:13px;color:var(--muted)}
  iframe{flex:1 1 auto;width:100%;border:0;display:block}

  @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.hero h1{font-size:32px}}
  @media(max-width:560px){.grid{grid-template-columns:1fr}.bar .hintkey{display:none}}
</style>
</head>

    <div class="wrap">

  const sections = document.getElementById('sections');
  const viewer = document.getElementById('viewer');
  const frame = document.getElementById('frame');
  const vname = document.querySelector('#vtitle .vname');
  const ubadge = document.querySelector('#vtitle .ubadge');
  const vtitle = document.getElementById('vtitle');

  function b64ToUtf8(b64){
    const bin = atob(b64);
    const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
    return new TextDecoder('utf-8').decode(bytes);
  }

  // 단원별로 묶기 (TOOLS는 이미 단원 순으로 정렬되어 있음)
  const groups = [];
  TOOLS.forEach((t, i) => {
    t._idx = i;
    let g = groups[groups.length - 1];
    if(!g || g.unit !== t.unit){ g = {unit: t.unit, list: []}; groups.push(g); }
    g.list.push(t);
  });

  groups.forEach(g => {
    const sec = document.createElement('div');
    sec.className = 'unit';
    const head = document.createElement('div');
    head.className = 'uhead';
    head.innerHTML =
      '<span class="uchip"><span class="big">단원 ' + g.unit + '</span></span>' +
      '<span class="ucount">도구 ' + g.list.length + '개</span>' +
      '<span class="uline"></span>';
    sec.appendChild(head);

    const grid = document.createElement('div');
    grid.className = 'grid';
    g.list.forEach(t => {
      const card = document.createElement('div');
      card.className = 'card';
      card.style.setProperty('--ac', t.accent);
      card.innerHTML =
        '<div class="top"><span class="emoji">' + t.emoji + '</span>' +
        '<span class="no">' + t.no + '번 도구</span></div>' +
        '<h3>' + t.title + '</h3>' +
        '<p>' + t.sub + '</p>' +
        '<div class="go">열기 →</div>';
      card.addEventListener('click', () => open(t._idx));
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    sections.appendChild(sec);
  });

  function open(i){
    const t = TOOLS[i];
    vtitle.style.setProperty('--ac', t.accent);
    ubadge.textContent = '단원 ' + t.unit;
    vname.textContent = t.emoji + '  ' + t.title;
    frame.srcdoc = b64ToUtf8(t.b64);
    viewer.classList.add('show');
    document.body.style.overflow = 'hidden';
    window.scrollTo(0,0);
  }
  function home(){
    viewer.classList.remove('show');
    frame.srcdoc = '';            // 실행 중인 타이머 등 정리
    document.body.style.overflow = '';
  }

  document.getElementById('back').addEventListener('click', home);
  document.addEventListener('keydown', e => {
    if(e.key === 'Escape' && viewer.classList.contains('show')) home();
  });
</script>
</body>
</html>
